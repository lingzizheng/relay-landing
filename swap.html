<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay — Swap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --v2:#F7F8FF;--v3:#EFF1FF;--v5:#D7DBFF;--v6:#C8CCFF;--v7:#B4B8FF;
  --v9:#4615C8;--v10:#3B00B4;--v11:#5A45DF;--v12:#2A226E;
  --s1:#FBFCFD;--s2:#F8F9FA;--s3:#F1F3F5;--s6:#DFE3E6;
  --s7:#D7DBDF;--s9:#889096;--s11:#687076;--s12:#11181C;
  --grass:#46A758;--amber:#FFB224;
  --r-md:8px;--r-lg:12px;--r-xl:16px;--r-full:9999px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:Inter,sans-serif;background:#f7f8ff;color:var(--s12);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;}

/* ─── NAV ─── */
nav{position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:12px;
  background:#fff;border-bottom:1px solid #eceef0;flex-shrink:0;}
.nav-left{display:flex;align-items:center;gap:32px;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none;}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-family:Inter,sans-serif;font-size:16px;font-weight:700;
  color:var(--s12);text-decoration:none;transition:color .18s;}
.nav-links a:hover{color:var(--v9);}
.nav-more{display:flex;align-items:center;gap:8px;font-family:Inter,sans-serif;
  font-size:16px;font-weight:700;color:var(--s12);cursor:pointer;
  background:none;border:none;padding:0;}
.nav-more svg{color:var(--s9);}
.nav-search{display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-radius:var(--r-lg);border:1px solid #eceef0;
  padding:8px 10px;width:400px;transition:border-color .15s;}
.nav-search:focus-within{border-color:var(--v9);}
.nav-search-inner{display:flex;align-items:center;gap:8px;}
.nav-search input{background:transparent;border:none;outline:none;
  font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s11);width:280px;}
.nav-search-kbd{border:1px solid var(--s6);border-radius:4px;padding:2px 6px;
  font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s11);}
.nav-wallet{display:flex;align-items:center;gap:8px;
  border:1px solid #eceef0;border-radius:var(--r-lg);padding:8px 12px;}
.nav-wallet-icons{display:flex;align-items:center;}
.nav-wallet-icon{width:20px;height:20px;border-radius:4px;border:1px solid var(--s3);
  overflow:hidden;background:#eee;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;flex-shrink:0;}
.nav-wallet-icon+.nav-wallet-icon{margin-left:-6px;}
.nav-wallet-bal{font-family:Inter,sans-serif;font-size:16px;font-weight:500;color:var(--s12);}

/* ─── PAGE CONTENT ─── */
.page-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 16px;}
.swap-col{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;position:relative;}

/* ─── TRENDING BAR ─── */
.trending-bar{position:relative;background:var(--v5);border-radius:var(--r-lg);
  height:50px;width:100%;overflow:hidden;flex-shrink:0;}
.trending-bar-fade{position:absolute;right:0;top:0;height:100%;width:64px;pointer-events:none;
  background:linear-gradient(to right,transparent,rgba(215,219,255,.9));}
.trending-bar-inner{position:absolute;inset:0;display:flex;align-items:center;gap:4px;
  padding-left:12px;padding-right:40px;}
.trending-label{display:flex;align-items:center;gap:4px;padding-right:8px;flex-shrink:0;}
.trending-label span{font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s12);}
.trending-pill{position:relative;background:#fff;border-radius:var(--r-full);
  display:flex;align-items:center;gap:4px;padding:6px 8px;
  border:1px solid #e4e7ff;flex-shrink:0;cursor:pointer;transition:background .15s;}
.trending-pill:hover{background:#f7f8ff;}
.trending-pill-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;position:relative;}
.trending-pill-badge{position:absolute;bottom:0;right:0;width:10px;height:10px;
  border-radius:2px;border:1px solid #fff;overflow:hidden;background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:700;}
.trending-pill-sym{font-family:Inter,sans-serif;font-size:16px;font-weight:700;color:var(--s12);}
.trending-chevron{position:absolute;right:12px;top:50%;transform:translateY(-50%);}

/* ─── SWAP/BUY TABS ─── */
.swap-tabs{display:flex;align-items:center;justify-content:space-between;width:100%;flex-shrink:0;}
.swap-tabs-left{display:flex;align-items:center;gap:4px;height:36px;}
.swap-tab{height:100%;padding:0 12px;border-radius:var(--r-lg);cursor:pointer;
  font-family:Inter,sans-serif;font-size:16px;font-weight:500;
  border:none;background:none;color:var(--s11);transition:all .15s;}
.swap-tab:hover{color:var(--s12);}
.swap-tab.active{background:var(--s1);border:1px solid #e4e7ff;color:var(--s12);}
.swap-settings-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--s1);border:1px solid #e4e7ff;border-radius:var(--r-lg);
  cursor:pointer;transition:background .15s;}
.swap-settings-btn:hover{background:var(--s3);}

/* ─── SWAP PANELS ─── */
.swap-panel{background:var(--s1);border-radius:var(--r-lg);border:1px solid #e4e7ff;
  padding:12px;display:flex;flex-direction:column;gap:12px;}
.swap-panel-head{display:flex;align-items:center;justify-content:space-between;}
.swap-panel-label{font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s11);}

/* Address badge */
.swap-addr{display:flex;align-items:center;gap:4px;padding:4px 4px;border-radius:var(--r-full);
  cursor:pointer;transition:background .15s;border:none;background:none;}
.swap-addr:hover{background:var(--s3);}
.swap-addr-icon{width:16px;height:16px;border-radius:3px;overflow:hidden;background:#8247E5;
  display:flex;align-items:center;justify-content:center;font-size:6px;color:#fff;font-weight:700;}
.swap-addr-text{font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s12);}

/* Amount row */
.swap-amount-row{display:flex;align-items:center;justify-content:space-between;}
.swap-amount{font-family:Inter,sans-serif;font-size:32px;font-weight:700;color:var(--s12);
  background:transparent;border:none;outline:none;width:160px;}
.swap-amount.placeholder{color:#c1c8cd;}

/* Token button */
.swap-token-btn{display:flex;align-items:center;gap:8px;background:var(--s3);
  border-radius:var(--r-full);padding:8px 12px;border:none;cursor:pointer;
  transition:background .15s;flex-shrink:0;}
.swap-token-btn:hover{background:#e8eaed;}
.swap-token-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;color:#fff;background:#627EEA;}
.swap-token-chain{position:absolute;bottom:0;right:0;transform:translate(2px,2px);
  width:14px;height:14px;border-radius:4px;border:1px solid #fff;overflow:hidden;
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:6px;font-weight:700;}
.swap-token-info{display:flex;flex-direction:column;align-items:flex-start;}
.swap-token-symbol{font-family:Inter,sans-serif;font-size:16px;font-weight:700;color:var(--s12);line-height:1.2;}
.swap-token-chain-name{font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:var(--s11);line-height:1.2;}

/* Select Token pill */
.swap-select-token{display:flex;align-items:center;gap:12px;background:var(--v9);
  border-radius:var(--r-full);padding:12px 16px;border:none;cursor:pointer;
  transition:background .15s;flex-shrink:0;}
.swap-select-token:hover{background:#3a0fa8;}
.swap-select-token span{font-family:'Chivo',sans-serif;font-size:16px;font-weight:700;
  font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:.02em;}

/* Selected receive token button */
.swap-recv-token-btn{display:flex;align-items:center;gap:8px;background:var(--s3);
  border-radius:var(--r-full);padding:8px 12px;border:none;cursor:pointer;
  transition:background .15s;flex-shrink:0;}
.swap-recv-token-btn:hover{background:#e8eaed;}

/* Fiat / balance row */
.swap-fiat-row{display:flex;align-items:baseline;justify-content:space-between;}
.swap-fiat{font-family:Inter,sans-serif;font-size:14px;font-weight:500;color:var(--s11);}
.swap-balance{font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:var(--s11);}
.swap-pct-btns{display:flex;gap:4px;}
.swap-pct{background:var(--s3);border:none;border-radius:var(--r-md);
  padding:4px 6px;font-family:Inter,sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:background .15s;}
.swap-pct:hover{background:#e8eaed;}

/* ─── ARROW CONNECTOR ─── */
.arrow-connector{position:absolute;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;justify-content:center;}
.arrow-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--s1);border:2px solid #e4e7ff;border-radius:10px;
  cursor:pointer;transition:background .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.arrow-btn:hover{background:#fff;}

/* ─── CTA BUTTON ─── */
.swap-cta{border-radius:var(--r-lg);width:100%;padding:12px 0;display:flex;
  align-items:center;justify-content:center;border:none;cursor:pointer;transition:background .15s;}
.swap-cta.active{background:var(--v9);}
.swap-cta.active:hover{background:#3a0fa8;}
.swap-cta.active span{font-family:'Chivo',sans-serif;font-size:16px;font-weight:700;
  font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:.02em;}
.swap-cta.disabled{background:#c1c8cd;cursor:not-allowed;}
.swap-cta.disabled span{font-family:Inter,sans-serif;font-size:16px;font-weight:700;color:var(--s11);}

/* ─── BOTTOM BAR ─── */
.bottom-bar{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:0 12px 16px;flex-shrink:0;}
.theme-toggle{background:var(--v5);border:1px solid var(--v6);border-radius:var(--r-full);
  padding:2px;display:flex;align-items:center;gap:4px;}
.theme-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;border:none;cursor:pointer;transition:all .15s;background:none;}
.theme-btn.active{background:#fff;border:1px solid var(--v5);}
.chat-btn{width:48px;height:48px;border-radius:24px;overflow:hidden;cursor:pointer;
  border:none;background:var(--v9);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(70,21,200,.25);transition:opacity .15s;}
.chat-btn:hover{opacity:.9;}

/* ─── TOKEN MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .18s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:var(--r-xl);width:640px;max-height:480px;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.modal-header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--s6);}
.modal-header span{font-family:Inter,sans-serif;font-size:16px;font-weight:700;color:var(--s12);}
.modal-close{background:none;border:none;cursor:pointer;padding:4px;display:flex;}
.modal-body{display:flex;flex:1;overflow:hidden;}
.modal-chains{width:200px;border-right:1px solid var(--s6);display:flex;flex-direction:column;overflow:hidden;}
.modal-chains-search{padding:12px;border-bottom:1px solid var(--s6);}
.modal-chains-search-inner{display:flex;align-items:center;gap:6px;background:var(--s2);
  border-radius:var(--r-md);padding:6px 8px;}
.modal-chains-search-inner input{background:transparent;border:none;outline:none;
  font-family:Inter,sans-serif;font-size:13px;font-weight:500;color:var(--s11);width:100%;}
.modal-chains-list{flex:1;overflow-y:auto;padding:4px 0;}
.modal-chain-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;
  border:none;background:none;cursor:pointer;font-family:Inter,sans-serif;
  font-size:14px;font-weight:500;color:var(--s12);transition:background .12s;text-align:left;}
.modal-chain-btn:hover{background:var(--s2);}
.modal-chain-btn.active{background:var(--v3);}
.modal-chain-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.modal-chain-star{margin-left:auto;color:var(--amber);font-size:12px;}
.modal-section-label{padding:8px 12px 4px;font-family:Inter,sans-serif;font-size:11px;
  font-weight:600;color:var(--s9);text-transform:uppercase;letter-spacing:.05em;}
.modal-tokens{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.modal-tokens-search{padding:12px;border-bottom:1px solid var(--s6);}
.modal-tokens-search-inner{display:flex;align-items:center;gap:6px;background:var(--s2);
  border-radius:var(--r-md);padding:6px 8px;}
.modal-tokens-search-inner input{background:transparent;border:none;outline:none;
  font-family:Inter,sans-serif;font-size:13px;font-weight:500;color:var(--s11);width:100%;}
.modal-tokens-list{flex:1;overflow-y:auto;}
.modal-token-row{display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:10px 16px;border:none;background:none;cursor:pointer;
  transition:background .12s;}
.modal-token-row:hover{background:var(--s2);}
.modal-token-left{display:flex;align-items:center;gap:10px;}
.modal-token-avatar{position:relative;width:36px;height:36px;}
.modal-token-avatar-main{width:36px;height:36px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.modal-token-avatar-badge{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;
  border-radius:4px;border:1.5px solid #fff;display:flex;align-items:center;
  justify-content:center;font-size:6px;font-weight:700;color:#fff;}
.modal-token-name{display:flex;flex-direction:column;align-items:flex-start;}
.modal-token-symbol{font-family:Inter,sans-serif;font-size:14px;font-weight:700;color:var(--s12);}
.modal-token-desc{font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:var(--s11);
  display:flex;align-items:center;gap:4px;}
.modal-token-right{display:flex;flex-direction:column;align-items:flex-end;}
.modal-token-usd{font-family:Inter,sans-serif;font-size:14px;font-weight:600;color:var(--s12);}
.modal-token-amount{font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:var(--s9);}
</style>
</head>

<script>
(function(){
'use strict';

// ── Constants ──
const ETH_PRICE = 2000;
const BALANCE = 0.35;

// ── Token / Chain data ──
const YOUR_TOKENS = [
  {id:'eth-op',symbol:'ETH',displayName:'Ethereum on Optimism',chainName:'Optimism',bg:'#627EEA',chainBg:'#FF4C0C',priceUsd:2000,usd:'$50.00',amount:'0.025 ETH'},
  {id:'usdc-op',symbol:'USDC',displayName:'USD Coin on Optimism',chainName:'Optimism',bg:'#2775CA',chainBg:'#FF4C0C',priceUsd:1,usd:'$120.00',amount:'120 USDC'},
  {id:'weth-op',symbol:'WETH',displayName:'Wrapped Ethereum on Optimism',chainName:'Optimism',bg:'#627EEA',chainBg:'#FF4C0C',priceUsd:2000,usd:'$300.00',amount:'0.15 WETH'}
];
const VOLUME_TOKENS = [
  {id:'blerf-base',symbol:'BLERF',displayName:'Blerf on Base',chainName:'Base',bg:'#FF69B4',chainBg:'#0052FF',priceUsd:0.0023,warn:true},
  {id:'weth-base',symbol:'WETH',displayName:'Wrapped Ethereum on Base',chainName:'Base',bg:'#627EEA',chainBg:'#0052FF',priceUsd:2000},
  {id:'usdc-base',symbol:'USDC',displayName:'USD Coin on Base',chainName:'Base',bg:'#2775CA',chainBg:'#0052FF',priceUsd:1},
  {id:'eth-arb',symbol:'ETH',displayName:'Ethereum on Arbitrum',chainName:'Arbitrum',bg:'#627EEA',chainBg:'#28A0F0',priceUsd:2000}
];
const CHAINS = {
  starred:[
    {id:'bitcoin',name:'Bitcoin',bg:'#F7931A'},
    {id:'base',name:'Base',bg:'#0052FF'},
    {id:'solana',name:'Solana',bg:'#9945FF'}
  ],
  az:[
    {id:'blast',name:'Blast',bg:'#FCFC04',dark:true},
    {id:'degen',name:'Degen',bg:'#A36EFD'},
    {id:'linea',name:'Linea',bg:'#61DFFF'},
    {id:'zora',name:'Zora',bg:'#2B5DF0'},
    {id:'gravity',name:'Gravity',bg:'#000'}
  ]
};

// ── State ──
let selectedToken = null;
let selectedChain = 'all';

// ── Read state from URL params (passed from relay-final.html) ──
const params = new URLSearchParams(window.location.search);
const initAmount = params.get('sendAmount');
const initTokenId = params.get('receiveToken');

// ── Position arrow connector at boundary of Send panel ──
(function positionArrow(){
  const col = document.querySelector('.swap-col');
  const panels = col.querySelectorAll('.swap-panel');
  const arrow = document.getElementById('swapArrowConnector');
  if(panels.length >= 2 && arrow){
    const sendPanel = panels[0];
    const top = sendPanel.offsetTop + sendPanel.offsetHeight + 4 - 16;
    arrow.style.top = top + 'px';
  }
})();

// ── DOM refs ──
const sendInput = document.getElementById('sendAmount');
const sendFiat = document.getElementById('sendFiat');
const recvAmount = document.getElementById('recvAmount');
const recvFiat = document.getElementById('recvFiat');
const recvSlot = document.getElementById('recvTokenSlot');
const recvBalance = document.getElementById('recvBalance');
const ctaBtn = document.getElementById('ctaBtn');
const modal = document.getElementById('tokenModal');
const chainList = document.getElementById('chainList');
const tokenList = document.getElementById('tokenList');
const chainSearch = document.getElementById('chainSearchInput');
const tokenSearch = document.getElementById('tokenSearchInput');

// ── Apply initial state ──
if(initAmount) sendInput.value = initAmount;

const allTokens = {};
YOUR_TOKENS.concat(VOLUME_TOKENS).forEach(t=>{ allTokens[t.id] = t; });

if(initTokenId && allTokens[initTokenId]){
  selectedToken = allTokens[initTokenId];
}

// ── Helpers ──
function fmt(n, maxDec){ return n.toLocaleString('en-US',{maximumFractionDigits:maxDec}); }

function computeReceive(sendEth, token){
  const usd = sendEth * ETH_PRICE;
  const raw = usd / token.priceUsd;
  if(raw>=1000) return fmt(raw,2);
  if(raw>=1)    return fmt(raw,4);
  return raw.toLocaleString('en-US',{maximumSignificantDigits:4});
}

function updateWidget(){
  const val = parseFloat(sendInput.value) || 0;
  sendFiat.textContent = '$' + fmt(val*ETH_PRICE, 2);
  if(selectedToken){
    const recv = computeReceive(val, selectedToken);
    recvAmount.textContent = recv;
    recvAmount.className = 'swap-amount';
    const recvUsd = parseFloat(recv.replace(/,/g,'')) * selectedToken.priceUsd;
    recvFiat.textContent = '$' + fmt(recvUsd, 2);
    recvBalance.style.opacity = '1';
    // CTA: active
    ctaBtn.className = 'swap-cta active';
    ctaBtn.querySelector('span').textContent = 'Swap Now';
  } else {
    recvAmount.textContent = '0';
    recvAmount.className = 'swap-amount placeholder';
    recvFiat.textContent = '$0';
    recvBalance.style.opacity = '0';
    // CTA: disabled
    ctaBtn.className = 'swap-cta disabled';
    ctaBtn.querySelector('span').textContent = 'Select a token';
  }
}

function renderRecvButton(){
  if(selectedToken){
    recvSlot.innerHTML = `
      <button class="swap-recv-token-btn" onclick="openTokenModal()">
        <div style="position:relative;display:flex;align-items:center;">
          <div class="swap-token-icon" style="background:${selectedToken.bg}">${selectedToken.symbol[0]}</div>
          <div class="swap-token-chain" style="background:${selectedToken.chainBg};color:#fff;">${selectedToken.chainName[0]}</div>
        </div>
        <div class="swap-token-info">
          <span class="swap-token-symbol">${selectedToken.symbol}</span>
          <span class="swap-token-chain-name">${selectedToken.chainName}</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#889096" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>`;
  } else {
    recvSlot.innerHTML = `
      <button class="swap-select-token" onclick="openTokenModal()">
        <span>Select Token</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>`;
  }
}

// ── Percentage buttons ──
window.setPct = function(pct){
  sendInput.value = (BALANCE * pct).toFixed(4).replace(/\.?0+$/,'');
  if(pct===1) sendInput.value = BALANCE.toString();
  updateWidget();
};

// ── Send input listener ──
sendInput.addEventListener('input', updateWidget);

// ── Modal: open / close ──
window.openTokenModal = function(){
  chainSearch.value = '';
  tokenSearch.value = '';
  renderChains();
  renderTokens();
  modal.classList.add('open');
};
window.closeTokenModal = function(){
  modal.classList.remove('open');
};

// ── Modal: chain list ──
function renderChains(){
  const q = chainSearch.value.toLowerCase();
  let html = '';
  html += `<button class="modal-chain-btn${selectedChain==='all'?' active':''}" onclick="selectChain('all')">
    <div class="modal-chain-icon" style="background:#888;">&#8776;</div> All Chains</button>`;
  html += '<div class="modal-section-label">Starred chains</div>';
  CHAINS.starred.filter(c=>c.name.toLowerCase().includes(q)).forEach(c=>{
    html += `<button class="modal-chain-btn${selectedChain===c.id?' active':''}" onclick="selectChain('${c.id}')">
      <div class="modal-chain-icon" style="background:${c.bg}">${c.name[0]}</div> ${c.name}
      <span class="modal-chain-star">&#9733;</span></button>`;
  });
  html += '<div class="modal-section-label">Chains A-Z</div>';
  CHAINS.az.filter(c=>c.name.toLowerCase().includes(q)).forEach(c=>{
    html += `<button class="modal-chain-btn${selectedChain===c.id?' active':''}" onclick="selectChain('${c.id}')">
      <div class="modal-chain-icon" style="background:${c.bg};${c.dark?'color:#000;':''}">${c.name[0]}</div> ${c.name}</button>`;
  });
  chainList.innerHTML = html;
}
window.selectChain = function(id){
  selectedChain = id;
  renderChains();
};
window.filterChains = renderChains;

// ── Modal: token list ──
function renderTokens(){
  const q = tokenSearch.value.toLowerCase();
  function matchToken(t){ return t.symbol.toLowerCase().includes(q) || t.displayName.toLowerCase().includes(q); }
  function tokenRow(t){
    const warnIcon = t.warn ? ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c1c8cd" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>' : '';
    const right = t.usd ? `<div class="modal-token-right"><span class="modal-token-usd">${t.usd}</span><span class="modal-token-amount">${t.amount}</span></div>` : '';
    return `<button class="modal-token-row" onclick="pickToken('${t.id}')">
      <div class="modal-token-left">
        <div class="modal-token-avatar">
          <div class="modal-token-avatar-main" style="background:${t.bg}">${t.symbol[0]}</div>
          <div class="modal-token-avatar-badge" style="background:${t.chainBg}">${t.chainName[0]}</div>
        </div>
        <div class="modal-token-name">
          <span class="modal-token-symbol">${t.symbol}</span>
          <span class="modal-token-desc">${t.displayName}${warnIcon}</span>
        </div>
      </div>
      ${right}
    </button>`;
  }
  let html = '<div class="modal-section-label" style="padding:4px 16px;">Your Tokens</div>';
  YOUR_TOKENS.filter(matchToken).forEach(t=>{ html += tokenRow(t); });
  html += '<div class="modal-section-label" style="padding:4px 16px;margin-top:8px;">Tokens by 24H volume</div>';
  VOLUME_TOKENS.filter(matchToken).forEach(t=>{ html += tokenRow(t); });
  tokenList.innerHTML = html;
}
window.filterTokens = renderTokens;

window.pickToken = function(id){
  selectedToken = allTokens[id];
  closeTokenModal();
  renderRecvButton();
  updateWidget();
};

// ── Tabs ──
window.setTab = function(tab){
  document.querySelectorAll('.swap-tab').forEach(b=>{
    b.classList.toggle('active', b.textContent === tab);
  });
};

// ── Theme toggle ──
window.setTheme = function(mode){
  const lightBtn = document.getElementById('lightBtn');
  const darkBtn = document.getElementById('darkBtn');
  if(mode==='light'){
    lightBtn.classList.add('active');
    darkBtn.classList.remove('active');
    lightBtn.querySelector('svg').setAttribute('stroke','#4615C8');
    darkBtn.querySelector('svg').setAttribute('stroke','#989aff');
  } else {
    darkBtn.classList.add('active');
    lightBtn.classList.remove('active');
    darkBtn.querySelector('svg').setAttribute('stroke','#4615C8');
    lightBtn.querySelector('svg').setAttribute('stroke','#989aff');
  }
};

// ── Init ──
renderRecvButton();
updateWidget();
renderChains();
renderTokens();

})();
</script>

</body>
</html>
